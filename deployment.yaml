apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - name: nginx-port
          containerPort: 80
          protocol: TCP
